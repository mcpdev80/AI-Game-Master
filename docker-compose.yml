volumes:
  postgres_data:
  api_data:
  redis_data:

services:
  vision:
    build:
      context: ./apps/vision
    ports:
      - "${VISION_PORT:-8090}:8090"

  postgres:
    image: postgres:18.3-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dungeon_master}
      POSTGRES_USER: ${POSTGRES_USER:-dungeon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dungeon}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dungeon} -d ${POSTGRES_DB:-dungeon_master}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4.8-bookworm
    ports:
      - "${REDIS_PORT:-6385}:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./apps/api
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8080
      APP_ENV: ${APP_ENV:-development}
      DEMO_OPERATOR_SECRET: ${DEMO_OPERATOR_SECRET:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3005,http://127.0.0.1:3005,http://localhost:13005,http://127.0.0.1:13005}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-127.0.0.1,::1}
      PUBLIC_RATE_LIMIT_WINDOW_SECONDS: ${PUBLIC_RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_DEMO_SEED: ${RATE_LIMIT_DEMO_SEED:-6}
      RATE_LIMIT_GM_RESPOND: ${RATE_LIMIT_GM_RESPOND:-30}
      RATE_LIMIT_STT: ${RATE_LIMIT_STT:-20}
      RATE_LIMIT_VISION: ${RATE_LIMIT_VISION:-30}
      RATE_LIMIT_CHARACTER_BUILDER: ${RATE_LIMIT_CHARACTER_BUILDER:-20}
      MAX_JSON_BODY_BYTES: ${MAX_JSON_BODY_BYTES:-1048576}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-26214400}
      MAX_AUDIO_UPLOAD_BYTES: ${MAX_AUDIO_UPLOAD_BYTES:-12582912}
      MAX_ZIP_UPLOAD_BYTES: ${MAX_ZIP_UPLOAD_BYTES:-41943040}
      MAX_ZIP_ENTRIES: ${MAX_ZIP_ENTRIES:-200}
      MAX_ZIP_EXTRACT_BYTES: ${MAX_ZIP_EXTRACT_BYTES:-125829120}
      DATABASE_URL: ${DATABASE_URL:-postgres://dungeon:dungeon@postgres:5432/dungeon_master?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-medium}
      OPENAI_STORE: ${OPENAI_STORE:-false}
      OPENAI_BUDGET_SOFT_LIMIT_USD: ${OPENAI_BUDGET_SOFT_LIMIT_USD:-10}
      OPENAI_BUDGET_HARD_LIMIT_USD: ${OPENAI_BUDGET_HARD_LIMIT_USD:-25}
      OPENAI_USAGE_ALERT_EMAIL: ${OPENAI_USAGE_ALERT_EMAIL:-alerts@example.com}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-local-model}
      LLM_API_KEY: ${LLM_API_KEY:-}
      TTS_PROVIDER: ${TTS_PROVIDER:-openai}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-cedar}
      TTS_BASE_URL: ${TTS_BASE_URL:-http://host.docker.internal:8091/v1}
      TTS_MODEL: ${TTS_MODEL:-piper}
      TTS_API_KEY: ${TTS_API_KEY:-}
      STT_PROVIDER: ${STT_PROVIDER:-openai}
      OPENAI_STT_MODEL: ${OPENAI_STT_MODEL:-gpt-4o-transcribe}
      OPENAI_STT_PROMPT: ${OPENAI_STT_PROMPT:-Tabletop role-playing game session. Preserve character names, fantasy terms, dice notation such as d20, and natural punctuation.}
      STT_BASE_URL: ${STT_BASE_URL:-http://host.docker.internal:8092/v1}
      STT_MODEL: ${STT_MODEL:-nvidia/parakeet-tdt-0.6b-v3}
      STT_API_KEY: ${STT_API_KEY:-}
      VISION_BASE_URL: ${VISION_BASE_URL:-http://vision:8090}
      UPLOADS_DIR: ${UPLOADS_DIR:-/tmp/data/uploads}
    depends_on:
      vision:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${API_PORT:-8085}:8080"
    volumes:
      - api_data:/tmp/data

  web:
    build:
      context: ./apps/web
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    environment:
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:8080}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:18085}
      NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-dev}
      NEXT_PUBLIC_GIT_COMMIT: ${GIT_COMMIT:-dev}
      NEXT_PUBLIC_BUILD_DATE: ${BUILD_DATE:-unknown}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3005}:3000"

  https-proxy:
    image: nginx:1.29-bookworm
    profiles: ["https"]
    depends_on:
      - web
    ports:
      - "${HTTPS_HTTP_PORT:-3080}:80"
      - "${HTTPS_PORT:-3443}:3443"
    volumes:
      - ./docker/nginx/local-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
